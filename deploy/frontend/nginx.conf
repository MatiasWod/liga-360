server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API proxy — same path rewriting as vite.config.ts (K8s service DNS names)
    location /api/graphql {
        rewrite ^/api/graphql(.*)$ /graphql$1 break;
        proxy_pass http://gateway:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Person_Profile fue absorbido por teams-svc. La ruta legacy /api/teams/profiles ya queda
    # cubierta por el bloque genérico /api/teams (teams-svc reescribe /teams/profiles → /profiles).
    # Ruta limpia /api/profiles → teams-svc.
    location /api/profiles {
        rewrite ^/api/profiles(.*)$ /profiles$1 break;
        proxy_pass http://teams-svc:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ruta limpia /api/participants → teams-svc (la legacy /api/teams/participants sigue
    # cubierta por el alias interno de teams-svc).
    location /api/participants {
        rewrite ^/api/participants(.*)$ /participants$1 break;
        proxy_pass http://teams-svc:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/teams {
        rewrite ^/api/teams(.*)$ /teams$1 break;
        proxy_pass http://teams-svc:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth {
        rewrite ^/api/auth(.*)$ $1 break;
        proxy_pass http://auth-svc:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/inscriptions {
        rewrite ^/api/inscriptions(.*)$ $1 break;
        proxy_pass http://inscriptions-svc:4004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Estadísticas agregadas y rutas generales de matchevents-svc (scorers/cards/teams).
    location /api/matchevents {
        rewrite ^/api/matchevents(.*)$ $1 break;
        proxy_pass http://matchevents-svc:4006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Eventos de partido (goles/tarjetas) viven en matchevents-svc.
    location /api/matches {
        rewrite ^/api/matches(.*)$ /matches$1 break;
        proxy_pass http://matchevents-svc:4006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
