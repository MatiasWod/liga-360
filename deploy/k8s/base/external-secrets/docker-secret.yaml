apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: credenciales-dockerhub-es
  namespace: liga360
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets
    kind: ClusterSecretStore
  target:
    name: credenciales-dockerhub
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"https://index.docker.io/v1/":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}'
  data:
    - secretKey: username
      remoteRef:
        key: credenciales-dockerhub
        property: username
    - secretKey: password
      remoteRef:
        key: credenciales-dockerhub
        property: password
