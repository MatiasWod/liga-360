apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate-inscriptions
  labels:
    app: db-migrate-inscriptions
    app.kubernetes.io/component: migrator
    app.kubernetes.io/part-of: liga360
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: db-migrate-inscriptions
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: liga360-migrator
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "migrate:inscriptions"]
          env:
            # Requiere la key POSTGRES_URL_INSCRIPTIONS en liga360-secrets (DB liga360_inscriptions).
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: liga360-secrets
                  key: POSTGRES_URL_INSCRIPTIONS
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
