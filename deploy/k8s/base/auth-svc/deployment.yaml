apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-svc
  labels:
    app: auth-svc
    app.kubernetes.io/part-of: liga360
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-svc
  template:
    metadata:
      labels:
        app: auth-svc
    spec:
      containers:
        - name: auth-svc
          image: liga360-auth-svc
          imagePullPolicy: Always
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            # DB propia (DB-per-service). Requiere la key POSTGRES_URL_AUTH en liga360-secrets.
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: liga360-secrets
                  key: POSTGRES_URL_AUTH
          envFrom:
            - configMapRef:
                name: liga360-config
            - secretRef:
                name: liga360-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
