# GitOps entrypoint — single deploy path for the cluster (no k8s/overlays/local).
#   kubectl apply -f deploy/argocd/application-dev.yaml
#   argocd app sync liga360-dev
#
# Requires images on Docker Hub (CI on main) and secret credenciales-dockerhub in liga360.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: liga360-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/part-of: liga360
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bitbucket.org/itba/pf-2025b-liga360.git
    targetRevision: main
    path: deploy/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: liga360
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=false
