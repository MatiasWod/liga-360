image: alpine:3.20

definitions:
  services:
    docker:
      memory: 3072

  caches:
    npm: .npm

  steps:
    - step: &terraform-validate
        runs-on:
          - self.hosted
        name: Terraform Validate
        condition:
          changesets:
            includePaths:
              - "deploy/terraform/**"
        image: hashicorp/terraform:1.8.5
        script:
          - cd deploy/terraform
          - terraform version
          - terraform fmt -check
          - terraform init
          - terraform validate

    - step: &terraform-plan
        runs-on:
          - self.hosted
        name: Terraform Plan
        condition:
          changesets:
            includePaths:
              - "deploy/terraform/**"
        image: hashicorp/terraform:1.8.5
        script:
          - cd deploy/terraform
          - terraform init
          - terraform plan -out=tfplan
        artifacts:
          - deploy/terraform/tfplan

    - step: &terraform-apply
        runs-on:
          - self.hosted
        name: Terraform Apply
        condition:
          changesets:
            includePaths:
              - "deploy/terraform/**"
        image: hashicorp/terraform:1.8.5
        trigger: manual
        script:
          - cd deploy/terraform
          - terraform init
          - terraform apply -auto-approve tfplan

    - step: &terraform-destroy
        runs-on:
          - self.hosted
        name: Terraform Destroy
        image: hashicorp/terraform:1.8.5
        script:
          - cd deploy/terraform
          - terraform init
          - terraform destroy -auto-approve

    - step: &build
        runs-on:
          - self.hosted
        name: Build
        image: node:20-alpine
        caches:
          - npm
        script:
          - npm ci --cache .npm --prefer-offline
          - npm run build

    - step: &test
        runs-on:
          - self.hosted
        name: Unit + Integration Tests
        image: node:20-alpine
        caches:
          - npm
        script:
          # Las suites unit/integration no requieren Postgres (los servicios SQL aíslan el acceso
          # a datos en repos y se testean sin DB). Las migraciones por servicio viven en
          # database/migrations-{auth,teams,inscriptions} y corren en deploy (Jobs db-migrate-*).
          - npm ci --cache .npm --prefer-offline
          - npm install --prefix services/inscriptions-svc
          - npm install --prefix services/tournaments-svc
          - npm run test:ci

    - step: &docker-build-push
        runs-on:
          - self.hosted
        services:
          - docker
        caches:
          - docker
        script:
          - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
          - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" $BUILD_CONTEXT $DOCKERFILE_ARG
          - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
          - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
          - docker push "$DOCKER_USER/$SVC:latest"

pipelines:
  pull-requests:
    "**":
      - step: *build
        runs-on:
          - self.hosted
      - step: *test
        runs-on:
          - self.hosted

  branches:
    main:
      # Ahora estos pasos se ejecutarán SIEMPRE, sin importar si tocaste la carpeta de terraform o no.
      - step: *terraform-validate
        runs-on:
          - self.hosted
      - step: *build
        runs-on:
          - self.hosted
      - step: *test
        runs-on:
          - self.hosted
      - step: *terraform-plan
        runs-on:
          - self.hosted
      - step: *terraform-apply
        runs-on:
          - self.hosted

      - parallel:
          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Frontend
              script:
                - export SVC="liga360-frontend"
                - export BUILD_CONTEXT="."
                - export DOCKERFILE_ARG="-f deploy/frontend/Dockerfile"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" -f deploy/frontend/Dockerfile .
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Auth Svc
              script:
                - export SVC="liga360-auth-svc"
                - whoami
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" ./services/auth-svc
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Gateway
              script:
                - export SVC="liga360-gateway"
                # Diagnóstico temporal: docker da "Permission denied" (exit 126) en el runner.
                - command -v docker; ls -la "$(command -v docker)" || true
                - id
                - findmnt -T "$(command -v docker)" || true
                - docker version || true
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" ./services/gateway
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Inscriptions Svc
              script:
                - export SVC="liga360-inscriptions-svc"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" ./services/inscriptions-svc
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Teams Svc
              script:
                - export SVC="liga360-teams-svc"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" ./services/teams-svc
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push MatchEvents Svc
              script:
                - export SVC="liga360-matchevents-svc"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" ./services/matchevents-svc
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Tournaments Svc
              script:
                - export SVC="liga360-tournaments-svc"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" ./services/tournaments-svc
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push DB Migrator
              script:
                - export SVC="liga360-migrator"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" -f database/Dockerfile .
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

      - step:
          runs-on:
            - self.hosted
          name: Notify GitOps
          image: alpine:3.20
          script:
            - echo "Images pushed. ArgoCD will sync from deploy/k8s/overlays/dev." 

      - step:
          runs-on:
            - self.hosted
          name: Update GitOps Tags
          image: alpine:3.20
          script:
            - apk add --no-cache git python3
            - "python3 -c \"import os;from pathlib import Path;path=Path('deploy/k8s/overlays/dev/kustomization.yaml');content=path.read_text(encoding='utf-8');commit=os.environ.get('BITBUCKET_COMMIT','latest');lines=[(line[:len(line)-len(line.lstrip(' '))]+'newTag: '+commit) if line.strip().startswith('newTag:') else line for line in content.splitlines()];updated='\\n'.join(lines)+'\\n';path.write_text(updated,encoding='utf-8') if updated!=content else None\""
            - git status --porcelain
            - export GIT_AUTHOR_NAME="bitbucket-pipelines"
            - export GIT_AUTHOR_EMAIL="pipelines@bitbucket"
            - export GIT_COMMITTER_NAME="$GIT_AUTHOR_NAME"
            - export GIT_COMMITTER_EMAIL="$GIT_AUTHOR_EMAIL"
            - git add deploy/k8s/overlays/dev/kustomization.yaml
            - 'git commit -m "ci: update k8s image tags [skip ci]" || exit 0'
            - git remote set-url origin "https://$BITBUCKET_USER:$BITBUCKET_APP_PASSWORD@bitbucket.org/$BITBUCKET_REPO_FULL_NAME.git"
            - git push origin HEAD:main

  custom:
    terraform-destroy:
      - step: *terraform-destroy
        runs-on:
          - self.hosted
