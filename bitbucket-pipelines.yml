image: alpine:3.20

definitions:
  services:
    docker:
      memory: 3072
    # Postgres real para las suites de integración (DB-per-service). Crea liga360_auth;
    # las otras 3 DBs y las migraciones se aplican en el step de tests.
    postgres:
      image: postgres:16-alpine
      variables:
        POSTGRES_DB: liga360_auth
        POSTGRES_USER: liga
        POSTGRES_PASSWORD: liga

  caches:
    npm: .npm

  steps:
    - step: &terraform-validate
        runs-on:
          - self.hosted
        name: Terraform Validate
        condition:
          changesets:
            includePaths:
              - "deploy/terraform/**"
        image: hashicorp/terraform:1.8.5
        script:
          - cd deploy/terraform
          - terraform version
          - terraform fmt -check
          - terraform init
          - terraform validate

    - step: &terraform-plan
        runs-on:
          - self.hosted
        name: Terraform Plan
        condition:
          changesets:
            includePaths:
              - "deploy/terraform/**"
        image: hashicorp/terraform:1.8.5
        script:
          - cd deploy/terraform
          - terraform init
          - terraform plan -out=tfplan
        artifacts:
          - deploy/terraform/tfplan

    - step: &terraform-apply
        runs-on:
          - self.hosted
        name: Terraform Apply
        condition:
          changesets:
            includePaths:
              - "deploy/terraform/**"
        image: hashicorp/terraform:1.8.5
        trigger: manual
        script:
          - cd deploy/terraform
          - terraform init
          - terraform apply -auto-approve tfplan

    - step: &terraform-destroy
        runs-on:
          - self.hosted
        name: Terraform Destroy
        image: hashicorp/terraform:1.8.5
        script:
          - cd deploy/terraform
          - terraform init
          - terraform destroy -auto-approve

    - step: &build
        runs-on:
          - self.hosted
        name: Build
        image: node:20-alpine
        caches:
          - npm
        script:
          - npm ci --cache .npm --prefer-offline
          - npm run build

    - step: &test
        runs-on:
          - self.hosted
        name: Unit + Integration Tests
        image: node:20-alpine
        services:
          - postgres
        caches:
          - npm
        script:
          # NOTA: npm ci en la raíz ya instala todos los workspaces (packages/*, services/*),
          # incluyendo @liga360/shared. No usar npm install --prefix porque rompe la resolución
          # de workspaces locales e intenta buscar @liga360/shared en el registry.
          # database/ NO es workspace → su npm ci es aparte (trae node-pg-migrate).
          - apk add --no-cache postgresql-client
          - npm ci --cache .npm --prefer-offline
          - npm ci --cache .npm --prefer-offline --prefix database
          # Unit (frontend + servicios sin DB): feedback rápido antes de tocar Postgres.
          - npm run test:unit
          # Postgres real para integración. El servicio crea liga360_auth; el resto acá.
          - until pg_isready -h 127.0.0.1 -U liga; do echo "esperando postgres..."; sleep 1; done
          - export PGPASSWORD=liga
          - for db in liga360_teams liga360_inscriptions liga360_matchevents; do psql -h 127.0.0.1 -U liga -d postgres -c "CREATE DATABASE $db"; done
          - DATABASE_URL=postgresql://liga:liga@127.0.0.1:5432/liga360_auth npm run migrate:auth --prefix database
          - DATABASE_URL=postgresql://liga:liga@127.0.0.1:5432/liga360_teams npm run migrate:teams --prefix database
          - DATABASE_URL=postgresql://liga:liga@127.0.0.1:5432/liga360_inscriptions npm run migrate:inscriptions --prefix database
          - DATABASE_URL=postgresql://liga:liga@127.0.0.1:5432/liga360_matchevents npm run migrate:matchevents --prefix database
          # Integración: cada servicio apunta a SU base (POSTGRES_URL explícito; el default varía).
          # tournaments-svc es GraphQL/Neo4j: su integración no usa Postgres.
          - POSTGRES_URL=postgresql://liga:liga@127.0.0.1:5432/liga360_auth npm test --prefix services/auth-svc
          - POSTGRES_URL=postgresql://liga:liga@127.0.0.1:5432/liga360_teams npm test --prefix services/teams-svc
          - POSTGRES_URL=postgresql://liga:liga@127.0.0.1:5432/liga360_inscriptions npm test --prefix services/inscriptions-svc
          - POSTGRES_URL=postgresql://liga:liga@127.0.0.1:5432/liga360_matchevents npm test --prefix services/matchevents-svc
          - npm test --prefix services/tournaments-svc

    - step: &docker-build-push
        runs-on:
          - self.hosted
        # docker:cli trae su propio cliente docker: no depende del binario que el runner
        # inyecta en el contenedor (roto en runners viejos → "docker: Permission denied").
        # DOCKER_HOST ya apunta al servicio DinD, así que el cliente lo usa directo.
        image: docker:27-cli
        services:
          - docker
        caches:
          - docker
        script:
          - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
          - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" $BUILD_CONTEXT $DOCKERFILE_ARG
          - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
          - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
          - docker push "$DOCKER_USER/$SVC:latest"

pipelines:
  pull-requests:
    "**":
      - step: *build
        runs-on:
          - self.hosted
      - step: *test
        runs-on:
          - self.hosted

  branches:
    main:
      # Ahora estos pasos se ejecutarán SIEMPRE, sin importar si tocaste la carpeta de terraform o no.
      - step: *terraform-validate
        runs-on:
          - self.hosted
      - step: *build
        runs-on:
          - self.hosted
      - step: *test
        runs-on:
          - self.hosted
      - step: *terraform-plan
        runs-on:
          - self.hosted
      - step: *terraform-apply
        runs-on:
          - self.hosted

      - parallel:
          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Frontend
              condition:
                changesets:
                  includePaths:
                    - "frontend/**"
              script:
                - export SVC="liga360-frontend"
                - export BUILD_CONTEXT="."
                - export DOCKERFILE_ARG="-f deploy/frontend/Dockerfile"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" -f deploy/frontend/Dockerfile .
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Auth Svc
              condition:
                changesets:
                  includePaths:
                    - "services/auth-svc/**"
              script:
                - export SVC="liga360-auth-svc"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" -f services/auth-svc/Dockerfile .
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Gateway
              condition:
                changesets:
                  includePaths:
                    - "services/gateway/**"
              script:
                - export SVC="liga360-gateway"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" ./services/gateway
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Inscriptions Svc
              condition:
                changesets:
                  includePaths:
                    - "services/inscriptions-svc/**"
              script:
                - export SVC="liga360-inscriptions-svc"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" -f services/inscriptions-svc/Dockerfile .
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Teams Svc
              condition:
                changesets:
                  includePaths:
                    - "services/teams-svc/**"
              script:
                - export SVC="liga360-teams-svc"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" -f services/teams-svc/Dockerfile .
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push MatchEvents Svc
              condition:
                changesets:
                  includePaths:
                    - "services/matchevents-svc/**"
              script:
                - export SVC="liga360-matchevents-svc"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" -f services/matchevents-svc/Dockerfile .
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push Tournaments Svc
              condition:
                changesets:
                  includePaths:
                    - "services/tournaments-svc/**"
              script:
                - export SVC="liga360-tournaments-svc"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" ./services/tournaments-svc
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

          - step:
              runs-on:
                - self.hosted
              <<: *docker-build-push
              name: Build + Push DB Migrator
              condition:
                changesets:
                  includePaths:
                    - "database/**"
              script:
                - export SVC="liga360-migrator"
                - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
                - docker build -t "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" -f database/Dockerfile .
                - docker tag "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT" "$DOCKER_USER/$SVC:latest"
                - docker push "$DOCKER_USER/$SVC:$BITBUCKET_COMMIT"
                - docker push "$DOCKER_USER/$SVC:latest"

      - step:
          runs-on:
            - self.hosted
          name: Notify GitOps
          image: alpine:3.20
          script:
            - echo "Images pushed. ArgoCD will sync from deploy/k8s/overlays/dev." 

      - step:
          runs-on:
            - self.hosted
          name: Update GitOps Tags
          image: alpine:3.20
          script:
            - apk add --no-cache git python3
            - "python3 -c \"import os;from pathlib import Path;path=Path('deploy/k8s/overlays/dev/kustomization.yaml');content=path.read_text(encoding='utf-8');commit=os.environ.get('BITBUCKET_COMMIT','latest');lines=[(line[:len(line)-len(line.lstrip(' '))]+'newTag: '+commit) if line.strip().startswith('newTag:') else line for line in content.splitlines()];updated='\\n'.join(lines)+'\\n';path.write_text(updated,encoding='utf-8') if updated!=content else None\""
            - git status --porcelain
            - export GIT_AUTHOR_NAME="bitbucket-pipelines"
            - export GIT_AUTHOR_EMAIL="pipelines@bitbucket"
            - export GIT_COMMITTER_NAME="$GIT_AUTHOR_NAME"
            - export GIT_COMMITTER_EMAIL="$GIT_AUTHOR_EMAIL"
            - git add deploy/k8s/overlays/dev/kustomization.yaml
            - 'git commit -m "ci: update k8s image tags [skip ci]" || exit 0'
            - git remote set-url origin "https://$BITBUCKET_USER:$BITBUCKET_APP_PASSWORD@bitbucket.org/$BITBUCKET_REPO_FULL_NAME.git"
            - git push origin HEAD:main

  custom:
    terraform-destroy:
      - step: *terraform-destroy
        runs-on:
          - self.hosted
