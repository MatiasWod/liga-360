image: node:20

definitions:
  steps:
    - step: &build-and-push-service
       name: Build & Push Service
       services:
        - docker
       caches:
        - docker
       script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin

        - export CURRENT_SERVICE_NAME=$SERVICE_NAME
        - echo "Building and pushing service $CURRENT_SERVICE_NAME..."

        - docker build -t "$DOCKER_USER/$CURRENT_SERVICE_NAME:$BITBUCKET_COMMIT" $DOCKERFILE_PATH

        - docker tag "$DOCKER_USER/$CURRENT_SERVICE_NAME:$BITBUCKET_COMMIT" "$DOCKER_USER/$CURRENT_SERVICE_NAME:latest"

        - docker push "$DOCKER_USER/$CURRENT_SERVICE_NAME:$BITBUCKET_COMMIT"
        - docker push "$DOCKER_USER/$CURRENT_SERVICE_NAME:latest"

    - step: &build
        name: Build (required)
        caches:
          - node
        script:
          - npm ci
          - npm run build
    - step: &test
        name: Tests — Unit + Integration (required)
        caches:
          - node
        script:
          - npm ci
          - npm install --prefix services/inscriptions-svc
          - npm install --prefix services/tournaments-svc
          - npm run test:ci

pipelines:
#  pull-requests:
#    '**':
#      - step: *build
#      - step: *test

  branches:
    main:
      - step: *build
      - step: *test
      - parallel:
          - step:
              <<: *build-and-push-service
              name: Deploy — Frontend
              env:
                SERVICE_NAME: "liga360-frontend"
                DOCKERFILE_PATH: "-f Dockerfile.frontend ."
          - step:
              <<: *build-and-push-service
              name: Deploy — Auth Svc
              env:
                SERVICE_NAME: "liga360-auth-svc"
                DOCKERFILE_PATH: "./services/auth-svc"
          - step:
              <<: *build-and-push-service
              name: Deploy — Gateway
              env:
                SERVICE_NAME: "liga360-gateway"
                DOCKERFILE_PATH: "./services/gateway"
          - step:
              <<: *build-and-push-service
              name: Deploy — Inscriptions Svc
              env:
                SERVICE_NAME: "liga360-inscriptions-svc"
                DOCKERFILE_PATH: "./services/inscriptions-svc"
          - step:
              <<: *build-and-push-service
              name: Deploy — Teams Svc
              env:
                SERVICE_NAME: "liga360-teams-svc"
                DOCKERFILE_PATH: "./services/teams-svc"
          - step:
              <<: *build-and-push-service
              name: Deploy — Tournaments Svc
              env:
                SERVICE_NAME: "liga360-tournaments-svc"
                DOCKERFILE_PATH: "./services/tournaments-svc"