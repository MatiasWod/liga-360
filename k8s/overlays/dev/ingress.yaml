apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: liga360
  labels:
    app.kubernetes.io/part-of: liga360
spec:
  ingressClassName: nginx
  rules:
    - host: liga360.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
