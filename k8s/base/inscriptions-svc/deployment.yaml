apiVersion: apps/v1
kind: Deployment
metadata:
  name: inscriptions-svc
  labels:
    app: inscriptions-svc
    app.kubernetes.io/part-of: liga360
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inscriptions-svc
  template:
    metadata:
      labels:
        app: inscriptions-svc
    spec:
      containers:
        - name: inscriptions-svc
          image: liga360/inscriptions-svc
          imagePullPolicy: Always
          ports:
            - containerPort: 4004
          env:
            - name: PORT
              value: "4004"
          envFrom:
            - configMapRef:
                name: liga360-config
            - secretRef:
                name: liga360-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
