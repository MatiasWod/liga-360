services:
  neo4j:
    image: neo4j:5.23.0-community
    container_name: liga360-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=512m
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: liga360-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-liga}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-liga}
      - POSTGRES_DB=${POSTGRES_DB:-liga360}
    ports:
      - '55432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liga} -d ${POSTGRES_DB:-liga360}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate-auth:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: liga360-migrate-auth
    command: ["npm", "run", "migrate:auth"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-liga}:${POSTGRES_PASSWORD:-liga}@postgres:5432/liga360_auth
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-inscriptions:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: liga360-migrate-inscriptions
    command: ["npm", "run", "migrate:inscriptions"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-liga}:${POSTGRES_PASSWORD:-liga}@postgres:5432/liga360_inscriptions
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-matchevents:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: liga360-migrate-matchevents
    command: ["npm", "run", "migrate:matchevents"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-liga}:${POSTGRES_PASSWORD:-liga}@postgres:5432/liga360_matchevents
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-teams:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: liga360-migrate-teams
    command: ["npm", "run", "migrate:teams"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-liga}:${POSTGRES_PASSWORD:-liga}@postgres:5432/liga360_teams
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  auth-svc:
    build: ./services/auth-svc
    container_name: liga360-auth-svc
    environment:
      - PORT=4003
      - JWT_SECRET=${JWT_SECRET:-devsecret}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-liga}:${POSTGRES_PASSWORD:-liga}@postgres:5432/liga360_auth
      - TEAMS_SVC_URL=http://teams-svc:4002
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      migrate-auth:
        condition: service_completed_successfully
    ports:
      - '4003:4003'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4003/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  tournaments-svc:
    build: ./services/tournaments-svc
    container_name: liga360-tournaments-svc
    environment:
      - PORT=4001
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - NODE_ENV=production
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - '4001:4001'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  teams-svc:
    build: ./services/teams-svc
    container_name: liga360-teams-svc
    environment:
      - PORT=4002
      - JWT_SECRET=${JWT_SECRET:-devsecret}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-liga}:${POSTGRES_PASSWORD:-liga}@postgres:5432/liga360_teams
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      migrate-teams:
        condition: service_completed_successfully
    ports:
      - '4002:4002'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4002/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  inscriptions-svc:
    build: ./services/inscriptions-svc
    container_name: liga360-inscriptions-svc
    environment:
      - PORT=4004
      - JWT_SECRET=${JWT_SECRET:-devsecret}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-liga}:${POSTGRES_PASSWORD:-liga}@postgres:5432/liga360_inscriptions
      - TEAMS_SVC_URL=http://teams-svc:4002
      - TOURNAMENTS_GRAPHQL_URL=http://gateway:4000/graphql
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      migrate-inscriptions:
        condition: service_completed_successfully
      teams-svc:
        condition: service_started
    ports:
      - '4004:4004'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4004/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  matchevents-svc:
    build: ./services/matchevents-svc
    container_name: liga360-matchevents-svc
    environment:
      - PORT=4006
      - JWT_SECRET=${JWT_SECRET:-devsecret}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-liga}:${POSTGRES_PASSWORD:-liga}@postgres:5432/liga360_matchevents
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      migrate-matchevents:
        condition: service_completed_successfully
    ports:
      - '4006:4006'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4006/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway:
    build: ./services/gateway
    container_name: liga360-gateway
    environment:
      - PORT=4000
      - TOURNAMENTS_SUBGRAPH_URL=http://tournaments-svc:4001/graphql
      - NODE_ENV=production
    depends_on:
      tournaments-svc:
        condition: service_healthy
    ports:
      - '4000:4000'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend/Dockerfile
    container_name: liga360-frontend
    depends_on:
      - gateway
      - teams-svc
      - auth-svc
      - inscriptions-svc
      - matchevents-svc
    ports:
      - '5173:80'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  neo4j_data:
  neo4j_logs:
  pg_data:
