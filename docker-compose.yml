services:
  neo4j:
    image: neo4j:5.23.0-community
    container_name: liga360-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=512m
    ports:
      - '7474:7474'   # HTTP
      - '7687:7687'   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: liga360-postgres
    environment:
      - POSTGRES_USER=liga
      - POSTGRES_PASSWORD=liga
      - POSTGRES_DB=liga360
    ports:
      - '55432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liga -d liga360"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth-svc:
    build: ./services/auth-svc
    container_name: liga360-auth-svc
    environment:
      - PORT=4003
      - JWT_SECRET=devsecret
      - POSTGRES_URL=postgresql://liga:liga@postgres:5432/liga360
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '4003:4003'

  tournaments-svc:
    build: ./services/tournaments-svc
    container_name: liga360-tournaments-svc
    environment:
      - PORT=4001
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - NODE_ENV=production
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - '4001:4001'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  teams-svc:
    build: ./services/teams-svc
    container_name: liga360-teams-svc
    environment:
      - PORT=4002
      - JWT_SECRET=devsecret
      - POSTGRES_URL=postgresql://liga:liga@postgres:5432/liga360
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '4002:4002'

  inscriptions-svc:
    build: ./services/inscriptions-svc
    container_name: liga360-inscriptions-svc
    environment:
      - PORT=4004
      - JWT_SECRET=devsecret
      - POSTGRES_URL=postgresql://liga:liga@postgres:5432/liga360
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '4004:4004'

  gateway:
    build: ./services/gateway
    container_name: liga360-gateway
    environment:
      - PORT=4000
      - TOURNAMENTS_SUBGRAPH_URL=http://tournaments-svc:4001/graphql
      - NODE_ENV=production
    depends_on:
      tournaments-svc:
        condition: service_healthy
    ports:
      - '4000:4000'

volumes:
  neo4j_data:
  neo4j_logs:
  pg_data:



