version: '3.9'

services:
  neo4j:
    image: neo4j:5.23.0-community
    container_name: liga360-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=512m
    ports:
      - '7474:7474'   # HTTP
      - '7687:7687'   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  postgres:
    image: postgres:16-alpine
    container_name: liga360-postgres
    environment:
      - POSTGRES_USER=liga
      - POSTGRES_PASSWORD=liga
      - POSTGRES_DB=liga360
    ports:
      - '55432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  tournaments-svc:
    build: ./services/tournaments-svc
    container_name: liga360-tournaments-svc
    environment:
      - PORT=4001
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - NODE_ENV=production
    depends_on:
      - neo4j
    ports:
      - '4001:4001'

  teams-svc:
    build: ./services/teams-svc
    container_name: liga360-teams-svc
    environment:
      - PORT=4002
      - JWT_SECRET=devsecret
      - POSTGRES_URL=postgresql://liga:liga@postgres:5432/liga360
      - NODE_ENV=production
    depends_on:
      - postgres
    ports:
      - '4002:4002'

  auth-svc:
    build: ./services/auth-svc
    container_name: liga360-auth-svc
    environment:
      - PORT=4003
      - JWT_SECRET=devsecret
      - POSTGRES_URL=postgresql://liga:liga@postgres:5432/liga360
      - NODE_ENV=production
    depends_on:
      - postgres
    ports:
      - '4003:4003'

  inscriptions-svc:
    build: ./services/inscriptions-svc
    container_name: liga360-inscriptions-svc
    environment:
      - PORT=4004
      - JWT_SECRET=devsecret
      - POSTGRES_URL=postgresql://liga:liga@postgres:5432/liga360
      - TOURNAMENTS_GRAPHQL_URL=http://gateway:4000/graphql
      - NODE_ENV=production
    depends_on:
      - postgres
    ports:
      - '4004:4004'

  gateway:
    build: ./services/gateway
    container_name: liga360-gateway
    environment:
      - PORT=4000
      - TOURNAMENTS_SUBGRAPH_URL=http://tournaments-svc:4001/graphql
      - NODE_ENV=production
    depends_on:
      - tournaments-svc
    ports:
      - '4000:4000'

volumes:
  neo4j_data:
  neo4j_logs:
  pg_data:



