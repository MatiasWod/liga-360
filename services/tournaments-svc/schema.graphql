type Query {
  health: String!
  version: String!
  tournaments: [Tournament!]!
  tournament(id: ID!): Tournament
  competition(id: ID!): Competition
  """Partidos donde participa cualquiera de las inscripciones (historial cross-torneo)."""
  matchesByInscriptionIds(ids: [ID!]!): [Match!]!
  """Serie de competición por id o slug (público)."""
  competitionSeries(id: ID, slug: String): CompetitionSeries
  """Series con al menos una edición publicada o finalizada (público)."""
  competitionSeriesList: [CompetitionSeries!]!
  """Series del organizador autenticado (incluye sin ediciones)."""
  myCompetitionSeries: [CompetitionSeries!]!
  """Palmarés derivado de ediciones finished de la serie."""
  seriesRollOfHonor(seriesId: ID!): [SeriesRollOfHonorRow!]!
  """Histórico agregado: palmarés, títulos, goleadores cross-edición."""
  seriesAggregates(seriesId: ID!): SeriesAggregates!
}

enum TournamentStatus {
  draft
  published
  finished
}

enum InscriptionMode {
  public
  invitation
}

type Mutation {
  createTournament(
    name: String!
    sport: String!
    season: String
    venue: String
    participantType: String
    maxSlots: Int
    inscriptionMode: InscriptionMode!
    status: TournamentStatus!
    seriesId: ID
    editionLabel: String
  ): Tournament!
  updateTournament(
    id: ID!
    name: String!
    sport: String!
    season: String
    venue: String
    participantType: String
    inscriptionMode: InscriptionMode!
    status: TournamentStatus!
    seriesId: ID
    editionLabel: String
  ): Tournament!
  deleteTournament(id: ID!): Boolean!
  createCompetitionSeries(name: String!, slug: String!, sport: String!): CompetitionSeries!
  updateCompetitionSeries(id: ID!, name: String!, sport: String!): CompetitionSeries!
  createCompetition(tournamentId: ID!, name: String!, order: Int!, maxSlots: Int): Competition!
  updateCompetition(competitionId: ID!, name: String!, order: Int!, maxSlots: Int): Competition!
  addStage(
    competitionId: ID!,
    name: String!,
    order: Int!,
    format: StageFormat!,
    configJson: String,
    childrenJson: String
  ): Stage!
  updateStage(
    stageId: ID!,
    name: String!,
    order: Int!,
    format: StageFormat!,
    configJson: String,
    childrenJson: String
  ): Stage!
  addTransition(
    fromStageId: ID!,
    toStageId: ID,
    label: String!,
    selectionKind: String!,
    topN: Int,
    rangeFrom: Int,
    rangeTo: Int,
    bottomN: Int,
    toExternalTournamentId: String,
    toExternalStageId: String,
    toExternalTournamentName: String,
    carryOverJson: String,
    timing: String
  ): Transition!
  saveTransitionPlacementSnapshot(transitionId: ID!, snapshotJson: String!): Transition!
  deleteTransition(transitionId: ID!): Boolean!
  syncStageGroups(stageId: ID!, totalGroups: Int!): [Group!]!
  assignInscriptionToGroup(
    stageId: ID!
    groupId: ID!
    inscriptionId: ID!
    tournamentId: ID!
    displayName: String!
  ): Boolean!
  generateLeagueRoundRobin(stageId: ID!, doubleRound: Boolean!, maxRounds: Int): [Match!]!
  generateSingleEliminationBracket(stageId: ID!, doubleRound: Boolean!): [Match!]!
  generateGroupsStageRoundRobin(stageId: ID!, doubleRound: Boolean!, maxRounds: Int): [Match!]!
  # Conserva sólo hasta `lastRoundInclusive` (elimina todas las llaves de ronda mayor).
  trimEliminationBracketAfterRound(stageId: ID!, tournamentId: ID!, lastRoundInclusive: Int!): Boolean!
  assignInscriptionToMatchSlot(
    stageId: ID!
    matchId: ID!
    slotRole: String!
    inscriptionId: ID
    tournamentId: ID!
    displayName: String
  ): Boolean!
  # Reasigna ronda/pierna/orden del partido (liga o grupos). Organizador.
  updateMatchScheduling(
    stageId: ID!
    matchId: ID!
    round: Int!
    leg: Int!
    slotIndex: Int!
  ): Boolean!
  hydrateEliminationFirstRoundFromRoster(stageId: ID!): Boolean!
  assignInscriptionToStage(
    stageId: ID!
    inscriptionId: ID!
    tournamentId: ID!
    displayName: String!
    force: Boolean
    seedOrder: Int
  ): Boolean!
  unassignInscriptionFromStage(
    stageId: ID!
    inscriptionId: ID!
    tournamentId: ID!
  ): Boolean!
  clearInscriptionAssignments(
    inscriptionId: ID!
    tournamentId: ID!
  ): Boolean!
  updateMatchResult(
    matchId: ID!
    homeScore: Int
    awayScore: Int
    status: String
  ): MatchResult!
  updateMatchDateTime(
    matchId: ID!
    scheduledAt: String
    venue: String
    referee: String
  ): MatchDateTimeResult!
  # Transición (emitida por la etapa del partido) asociada al ganador para avance / referencia.
  setMatchWinnerAdvancement(matchId: ID!, transitionId: ID): Match!
  setStageStatus(stageId: ID!, status: String!): Stage!
  """Crea nueva edición en la misma serie clonando estructura y aplicando snapshots next_edition."""
  createNextEditionFromTournament(
    sourceTournamentId: ID!
    editionLabel: String!
    name: String
    mode: NextEditionMode!
    seriesId: ID
  ): CreateNextEditionResult!
}

enum NextEditionMode {
  full
  structure_only
}

type CreateNextEditionResult {
  tournament: Tournament!
  warnings: [String!]!
  inscriptionsCreated: Int!
  permanenciesApplied: Int!
  snapshotsApplied: Int!
}

type MatchResult {
  id: ID!
  homeScore: Int
  awayScore: Int
  status: String!
}

type MatchDateTimeResult {
  id: ID!
  scheduledAt: String
  venue: String
  referee: String
}

type Tournament {
  id: ID!
  name: String!
  sport: String!
  season: String
  venue: String
  organizer: String
  participantType: String
  maxSlots: Int!
  inscriptionMode: InscriptionMode!
  status: TournamentStatus!
  """Serie a la que pertenece esta edición (opcional)."""
  seriesId: ID
  editionLabel: String
  competitions: [Competition!]!
}

type CompetitionSeries {
  id: ID!
  name: String!
  slug: String!
  sport: String!
  organizer: String
  editions: [SeriesEdition!]!
}

type SeriesEdition {
  tournamentId: ID!
  name: String!
  status: TournamentStatus!
  editionLabel: String
  season: String
}

type SeriesPodiumEntry {
  inscriptionId: ID!
  displayName: String!
  linkedTeamId: ID
}

type SeriesRollOfHonorRow {
  editionLabel: String
  tournamentId: ID!
  tournamentName: String!
  champion: SeriesPodiumEntry
  runnerUp: SeriesPodiumEntry
  thirdPlace: SeriesPodiumEntry
}

type SeriesTitleEntry {
  teamKey: String!
  displayName: String!
  linkedTeamId: ID
  titles: Int!
  identityApproximate: Boolean!
}

type SeriesScorerEntry {
  playerKey: String!
  displayName: String!
  goals: Int!
  linkedMemberId: ID
  identityApproximate: Boolean!
}

type SeriesAggregates {
  seriesId: ID!
  rollOfHonor: [SeriesRollOfHonorRow!]!
  editionsInProgress: [SeriesEdition!]!
  titlesByTeam: [SeriesTitleEntry!]!
  topScorers: [SeriesScorerEntry!]!
  finishedTournamentIds: [ID!]!
}

enum StageFormat {
  league
  groups
  elimination
  composed
}

type Stage {
  id: ID!
  name: String!
  order: Int!
  format: StageFormat!
  isInitial: Boolean!
  stageStatus: String!
  assignedInscriptions: [AssignedInscription!]!
  standings: [StandingsRow!]!
  configJson: String
  childrenJson: String
  transitions: [Transition!]!
  groups: [Group!]!
  keys: [Key!]!
  matches: [Match!]!
}

type Competition {
  id: ID!
  name: String!
  order: Int!
  maxSlots: Int
  effectiveMaxSlots: Int!
  stages: [Stage!]!
}

type Transition {
  id: ID!
  type: String!
  label: String
  toStageId: String
  selectionKind: String
  topN: Int
  rangeFrom: Int
  rangeTo: Int
  bottomN: Int
  toExternalTournamentId: String
  toExternalStageId: String
  toExternalTournamentName: String
  carryOverJson: String
  """in_season (default): avance dentro de la misma edición. next_edition: ascenso/descenso para la próxima temporada."""
  timing: String
  """JSON con clasificados pendientes de aplicar en una edición futura."""
  placementSnapshotJson: String
}

type Group {
  id: ID!
  name: String!
  order: Int!
  competitorIds: [ID!]!
  competitors: [Competitor!]!
  assignedInscriptions: [AssignedInscription!]!
  standings: [StandingsRow!]!
  capacity: Int
  matches: [Match!]!
}

type StandingsRow {
  position: Int!
  inscriptionId: ID!
  displayName: String!
  played: Int!
  won: Int!
  drawn: Int!
  lost: Int!
  goalsFor: Int!
  goalsAgainst: Int!
  goalDifference: Int!
  points: Int!
}

type Match {
  id: ID!
  round: Int
  leg: Int
  scheduledAt: String
  venue: String
  referee: String
  slotIndex: Int
  fixtureCode: String
  groupId: ID
  leagueHomeSeed: Int
  leagueAwaySeed: Int
  homeTeamId: ID
  awayTeamId: ID
  homeCompetitor: Competitor
  awayCompetitor: Competitor
  homeAssignedInscription: AssignedInscription
  awayAssignedInscription: AssignedInscription
  homeScore: Int
  awayScore: Int
  status: String
  winnerAdvancementTransitionId: ID
  matchKind: String
  """Contexto histórico (populated por matchesByInscriptionIds)."""
  tournamentId: ID
  tournamentName: String
  competitionId: ID
  competitionName: String
  stageId: ID
  stageName: String
}

type Key {
  id: ID!
  name: String!
  order: Int!
  groupIds: [ID!]!
}

type Team {
  id: ID!
}

enum CompetitorKind {
  team
  participant
}

type Competitor {
  id: ID!
  kind: CompetitorKind!
  displayName: String!
  shortName: String
  avatarUrl: String
  badgeUrl: String
  source: String
  updatedAt: String
}

type AssignedInscription {
  inscriptionId: ID!
  tournamentId: ID!
  displayName: String!
}



