type Query {
  health: String!
  version: String!
  tournaments: [Tournament!]!
  tournament(id: ID!): Tournament
  competition(id: ID!): Competition
}

enum TournamentStatus {
  draft
  published
}

enum InscriptionMode {
  public
  invitation
}

type Mutation {
  createTournament(
    name: String!
    sport: String!
    season: String
    venue: String
    participantType: String
    maxSlots: Int
    inscriptionMode: InscriptionMode!
    status: TournamentStatus!
  ): Tournament!
  updateTournament(
    id: ID!
    name: String!
    sport: String!
    season: String
    venue: String
    participantType: String
    inscriptionMode: InscriptionMode!
    status: TournamentStatus!
  ): Tournament!
  deleteTournament(id: ID!): Boolean!
  createCompetition(tournamentId: ID!, name: String!, order: Int!, maxSlots: Int): Competition!
  updateCompetition(competitionId: ID!, name: String!, order: Int!, maxSlots: Int): Competition!
  updateCompetitionMaxSlots(competitionId: ID!, maxSlots: Int): Competition!
  addStage(
    competitionId: ID!,
    name: String!,
    order: Int!,
    format: StageFormat!,
    configJson: String,
    childrenJson: String
  ): Stage!
  updateStage(
    stageId: ID!,
    name: String!,
    order: Int!,
    format: StageFormat!,
    configJson: String,
    childrenJson: String
  ): Stage!
  addTransitionTopN(fromStageId: ID!, toStageId: ID!, topN: Int!): Transition!
  addTransition(
    fromStageId: ID!,
    toStageId: ID,
    label: String!,
    selectionKind: String!,
    topN: Int,
    rangeFrom: Int,
    rangeTo: Int,
    bottomN: Int,
    toExternalTournamentId: String,
    toExternalStageId: String,
    toExternalTournamentName: String,
    carryOverJson: String
  ): Transition!
  deleteTransition(transitionId: ID!): Boolean!
  addGroup(stageId: ID!, name: String!, order: Int!): Group!
  syncStageGroups(stageId: ID!, totalGroups: Int!): [Group!]!
  addTeamToGroup(groupId: ID!, teamId: ID!): Boolean!
  addCompetitorToGroup(
    groupId: ID!,
    competitorId: ID!,
    kind: CompetitorKind!,
    displayName: String!,
    shortName: String,
    avatarUrl: String,
    badgeUrl: String
  ): Boolean!
  assignInscriptionToGroup(
    stageId: ID!
    groupId: ID!
    inscriptionId: ID!
    tournamentId: ID!
    displayName: String!
  ): Boolean!
  unassignInscriptionFromGroup(
    groupId: ID!
    inscriptionId: ID!
    tournamentId: ID!
  ): Boolean!
  upsertCompetitor(
    competitorId: ID!,
    kind: CompetitorKind!,
    displayName: String!,
    shortName: String,
    avatarUrl: String,
    badgeUrl: String
  ): Competitor!
  ensureEliminationBracket(stageId: ID!, totalSlots: Int!): [Match!]!
  generateLeagueRoundRobin(stageId: ID!, doubleRound: Boolean!): [Match!]!
  generateSingleEliminationBracket(stageId: ID!, doubleRound: Boolean!): [Match!]!
  generateGroupsStageRoundRobin(stageId: ID!, doubleRound: Boolean!): [Match!]!
  assignInscriptionToMatchSlot(
    stageId: ID!
    matchId: ID!
    slotRole: String!
    inscriptionId: ID
    tournamentId: ID!
    displayName: String
  ): Boolean!
  # Reasigna ronda/pierna/orden del partido (liga o grupos). Organizador.
  updateMatchScheduling(
    stageId: ID!
    matchId: ID!
    round: Int!
    leg: Int!
    slotIndex: Int!
  ): Boolean!
  createMatch(stageId: ID!, groupId: ID, homeTeamId: ID!, awayTeamId: ID!, round: Int, leg: Int, scheduledAt: String): Match!
  addKey(stageId: ID!, name: String!, order: Int!): Key!
  linkGroupToKey(keyId: ID!, groupId: ID!): Boolean!
  assignInscriptionToStage(
    stageId: ID!
    inscriptionId: ID!
    tournamentId: ID!
    displayName: String!
  ): Boolean!
  unassignInscriptionFromStage(
    stageId: ID!
    inscriptionId: ID!
    tournamentId: ID!
  ): Boolean!
  clearInscriptionAssignments(
    inscriptionId: ID!
    tournamentId: ID!
  ): Boolean!
}

type Tournament {
  id: ID!
  name: String!
  sport: String!
  season: String
  venue: String
  organizer: String
  participantType: String
  maxSlots: Int!
  inscriptionMode: InscriptionMode!
  status: TournamentStatus!
  competitions: [Competition!]!
}

enum StageFormat {
  league
  groups
  elimination
  composed
}

type Stage {
  id: ID!
  name: String!
  order: Int!
  format: StageFormat!
  isInitial: Boolean!
  assignedInscriptions: [AssignedInscription!]!
  configJson: String
  childrenJson: String
  transitions: [Transition!]!
  groups: [Group!]!
  keys: [Key!]!
  matches: [Match!]!
}

type Competition {
  id: ID!
  name: String!
  order: Int!
  maxSlots: Int
  effectiveMaxSlots: Int!
  stages: [Stage!]!
}

type Transition {
  id: ID!
  type: String!
  label: String
  toStageId: String
  selectionKind: String
  topN: Int
  rangeFrom: Int
  rangeTo: Int
  bottomN: Int
  toExternalTournamentId: String
  toExternalStageId: String
  toExternalTournamentName: String
  carryOverJson: String
}

type Group {
  id: ID!
  name: String!
  order: Int!
  competitorIds: [ID!]!
  competitors: [Competitor!]!
  assignedInscriptions: [AssignedInscription!]!
  capacity: Int
  matches: [Match!]!
}

type Match {
  id: ID!
  round: Int
  leg: Int
  scheduledAt: String
  slotIndex: Int
  fixtureCode: String
  groupId: ID
  leagueHomeSeed: Int
  leagueAwaySeed: Int
  homeTeamId: ID
  awayTeamId: ID
  homeCompetitor: Competitor
  awayCompetitor: Competitor
  homeAssignedInscription: AssignedInscription
  awayAssignedInscription: AssignedInscription
}

type Key {
  id: ID!
  name: String!
  order: Int!
  groupIds: [ID!]!
}

type Team {
  id: ID!
}

enum CompetitorKind {
  team
  participant
}

type Competitor {
  id: ID!
  kind: CompetitorKind!
  displayName: String!
  shortName: String
  avatarUrl: String
  badgeUrl: String
  source: String
  updatedAt: String
}

type AssignedInscription {
  inscriptionId: ID!
  tournamentId: ID!
  displayName: String!
}



